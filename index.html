<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Llegada de la Imprenta a España</title>

  <!-- MapLibre -->
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>

  <!-- EB Garamond -->
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="css/estilos.css" />
</head>

<body>

  <!-- BOTÓN HAMBURGUESA -->
  <button id="toggle-panel" class="toggle-btn">☰</button>

  <!-- OVERLAY -->
  <div id="overlay"></div>

  <div id="contenedor">
    <div id="panel">

      <!-- BOTÓN DE CERRAR -->
      <button id="close-panel" class="close-btn">✕</button>

      <h2>Llegada de la Imprenta a España</h2>
      <div id="timeline"></div>
    </div>

    <div id="map"></div>
  </div>

  <script>
    /* PANEL + OVERLAY */
    const panel = document.getElementById("panel");
    const overlay = document.getElementById("overlay");
    const toggleBtn = document.getElementById("toggle-panel");
    const closeBtn = document.getElementById("close-panel");

    function abrirPanel() {
      panel.classList.add("open");
      overlay.classList.add("visible");
      overlay.style.display = "block";
    }

    function cerrarPanel() {
      panel.classList.remove("open");
      overlay.classList.remove("visible");
      setTimeout(() => overlay.style.display = "none", 300);
    }

    toggleBtn.addEventListener("click", abrirPanel);
    closeBtn.addEventListener("click", cerrarPanel);
    overlay.addEventListener("click", cerrarPanel);

    /* MAPA — estilo mínimo + raster OSM */
    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {
          base: {
            type: "raster",
            tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
            tileSize: 256
          }
        },
        layers: [
          {
            id: "base-layer",
            type: "raster",
            source: "base"
          }
        ]
      },
      center: [-3.7, 40.4],
      zoom: 4
    });

    /* TIMELINE */
    fetch("data/timeline.json")
      .then(r => r.json())
      .then(datos => {
        const cont = document.getElementById("timeline");

        datos.timeline.forEach((item) => {
          const div = document.createElement("div");
          div.className = "paso";
          div.innerHTML = `<strong>${item.city}</strong> (${item.year})<br>${item.note}`;

          div.addEventListener("click", () => {
            map.flyTo({
              center: item.map_action.flyTo.center,
              zoom: item.map_action.flyTo.zoom,
              speed: 0.6
            });
            if (window.innerWidth <= 768) cerrarPanel();
          });

          cont.appendChild(div);
        });
      });

    map.on("load", function () {

      /* CAPA ESPAÑA */
      fetch("data/espana.geojson")
        .then(r => r.json())
        .then(geo => {
          map.addSource("imprenta-espana", { type: "geojson", data: geo });

          map.addLayer({
            id: "imprenta-espana-circulos",
            type: "circle",
            source: "imprenta-espana",
            paint: {
              "circle-radius": 7,
              "circle-color": "#8c3f2f",
              "circle-stroke-width": 2,
              "circle-stroke-color": "#fffaf0"
            }
          });
        });

      /* CAPA EUROPA */
      fetch("data/europa.geojson")
        .then(r => r.json())
        .then(geo => {
          map.addSource("imprenta-europa", { type: "geojson", data: geo });

          map.addLayer({
            id: "imprenta-europa-circulos",
            type: "circle",
            source: "imprenta-europa",
            paint: {
              "circle-radius": 7,
              "circle-color": "#3a2f1b",
              "circle-stroke-width": 2,
              "circle-stroke-color": "#fffaf0"
            }
          });
        });

      /* POPUPS */
      const popup = new maplibregl.Popup({
        closeButton: false,
        closeOnClick: false
      });

      function generarHTML(props) {
        let impresores = props.impresores_relevantes;
        if (typeof impresores === "string") {
          try { impresores = JSON.parse(impresores); }
          catch { impresores = [impresores]; }
        }
        if (!Array.isArray(impresores)) impresores = [impresores];

        let html = `
          <div style="max-width:220px">
            <h3 style="margin:0; font-size:16px;">${props.nombre}</h3>
            <p><strong>Año llegada imprenta:</strong> ${props.ano_llegada_imprenta}</p>
            <p><strong>Impresores:</strong> ${impresores.join(", ")}</p>
            <p>${props.nota}</p>
        `;
        if (props.imagen) {
          html += `<img src="${props.imagen}" style="width:100%; border-radius:4px; margin-top:6px;">`;
        }
        html += `</div>`;
        return html;
      }

      function activarPopups(capa) {
        map.on("mouseenter", capa, (e) => {
          map.getCanvas().style.cursor = "pointer";
          popup.setLngLat(e.features[0].geometry.coordinates)
               .setHTML(generarHTML(e.features[0].properties))
               .addTo(map);
        });

        map.on("mouseleave", capa, () => {
          map.getCanvas().style.cursor = "";
          popup.remove();
        });
      }

      activarPopups("imprenta-espana-circulos");
      activarPopups("imprenta-europa-circulos");
    });
  </script>
</body>
</html>
