<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Llegada de la Imprenta</title>

  <!-- MapLibre -->
  <link
    href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />
  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>

  <!-- Estilos -->
  <link rel="stylesheet" href="css/estilos.css" />
</head>

<body>
  <div id="contenedor">
    <div id="panel">
      <h2>Llegada de la Imprenta</h2>
      <div id="timeline"></div>
    </div>

    <div id="map"></div>
  </div>

  <script>
    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {},
        layers: []
      },
      center: [-3.7, 40.4],
      zoom: 4
    });

    map.on("load", function () {

      /* ---------------------------------------------------------
         1) FONDO OSM
      --------------------------------------------------------- */
      map.addSource("osm", {
        type: "raster",
        tiles: [
          "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
        ],
        tileSize: 256,
        attribution: "© OpenStreetMap contributors"
      });

      map.addLayer({
        id: "osm-layer",
        type: "raster",
        source: "osm",
        paint: {}
      });

      /* ---------------------------------------------------------
         2) CAPA ESPAÑA
      --------------------------------------------------------- */
      map.addSource("imprenta-espana", {
        type: "geojson",
        data: "data/espana.geojson"
      });

      map.addLayer({
        id: "imprenta-espana-puntos",
        type: "circle",
        source: "imprenta-espana",
        paint: {
          "circle-radius": 8,
          "circle-color": "#dc2626"
        }
      });

      /* ---------------------------------------------------------
         3) CAPA EUROPA
      --------------------------------------------------------- */
      map.addSource("imprenta-europa", {
        type: "geojson",
        data: "data/europa.geojson"
      });

      map.addLayer({
