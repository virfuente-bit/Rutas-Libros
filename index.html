<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Llegada de la Imprenta</title>

  <!-- MapLibre -->
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>

  <!-- EB Garamond -->
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="css/estilos.css" />
</head>

<body class="fuente-ebgaramond">

  <!-- BOTÓN HAMBURGUESA -->
  <button id="toggle-panel" class="toggle-btn">☰</button>

  <!-- OVERLAY -->
  <div id="overlay"></div>

  <div id="contenedor">
    <div id="panel">

      <!-- BOTÓN DE CERRAR -->
      <button id="close-panel" class="close-btn">✕</button>

      <!-- SELECTOR DE FUENTE -->
      <div class="fuente-contenedor">
        <label>Fuente:</label>
        <select id="selectorFuente">
          <option value="garamond">Garamond clásica</option>
          <option value="ebgaramond" selected>EB Garamond (histórica)</option>
        </select>
      </div>

      <!-- SELECTOR DE MODOS -->
      <div class="modo-contenedor">
        <label><input type="radio" name="modo" value="normal" checked> Normal</label>
        <label><input type="radio" name="modo" value="oscuro"> Oscuro</label>
        <label><input type="radio" name="modo" value="sepia"> Sepia</label>
        <label><input type="radio" name="modo" value="alto"> Alto contraste</label>
        <label><input type="radio" name="modo" value="antiguo"> Tema antiguo</label>
      </div>

      <!-- SELECTOR DE ESTILO DE MAPA -->
      <div class="mapa-contenedor">
        <label>Estilo de mapa:</label>
        <select id="estiloMapa">
          <option value="osm">OSM clásico</option>
          <option value="sat">Satélite</option>
          <option value="pergamino">Pergamino (Stamen Toner)</option>
          <option value="antique" selected>Carto Antique (Stamen Toner)</option>
        </select>
      </div>

      <h2>Llegada de la Imprenta</h2>
      <div id="timeline"></div>
    </div>

    <div id="map"></div>
  </div>

  <script>
    /* PANEL + OVERLAY */
    const panel = document.getElementById("panel");
    const overlay = document.getElementById("overlay");
    const toggleBtn = document.getElementById("toggle-panel");
    const closeBtn = document.getElementById("close-panel");

    function abrirPanel() {
      panel.classList.add("open");
      overlay.classList.add("visible");
      overlay.style.display = "block";
    }

    function cerrarPanel() {
      panel.classList.remove("open");
      overlay.classList.remove("visible");
      setTimeout(() => overlay.style.display = "none", 300);
    }

    toggleBtn.addEventListener("click", abrirPanel);
    closeBtn.addEventListener("click", cerrarPanel);
    overlay.addEventListener("click", cerrarPanel);

    /* SELECTOR DE FUENTE */
    document.getElementById("selectorFuente").addEventListener("change", (e) => {
      document.body.classList.remove("fuente-garamond", "fuente-ebgaramond");
      document.body.classList.add("fuente-" + e.target.value);
    });

    /* MODOS DE COLOR */
    document.querySelectorAll("input[name='modo']").forEach(radio => {
      radio.addEventListener("change", () => {
        document.body.classList.remove("modo-oscuro", "modo-sepia", "modo-alto", "modo-antiguo");
        if (radio.value === "oscuro") document.body.classList.add("modo-oscuro");
        if (radio.value === "sepia") document.body.classList.add("modo-sepia");
        if (radio.value === "alto") document.body.classList.add("modo-alto");
        if (radio.value === "antiguo") document.body.classList.add("modo-antiguo");
      });
    });

    /* MAPA */
    const map = new maplibregl.Map({
      container: "map",
      style: { version: 8, sources: {}, layers: [] },
      center: [-3.7, 40.4],
      zoom: 4
    });

    map.on("load", function () {

      /* ESTILOS DE MAPA */
      const estilos = {
        osm: {
          tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"]
        },
        sat: {
          tiles: ["https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"]
        },
        pergamino: {
          tiles: ["https://stamen-tiles.a.ssl.fastly.net/toner/{z}/{x}/{y}.png"]
        },
        antique: {
          tiles: ["https://stamen-tiles.a.ssl.fastly.net/toner/{z}/{x}/{y}.png"]
        }
      };

      map.addSource("base", {
        type: "raster",
        tiles: estilos.antique.tiles,
        tileSize: 256
      });

      map.addLayer({ id: "base-layer", type: "raster", source: "base" });

      document.getElementById("estiloMapa").addEventListener("change", (e) => {
        map.getSource("base").setTiles(estilos[e.target.value].tiles);
      });

      /* CAPAS GEOJSON */
      map.addSource("imprenta-espana", { type: "geojson", data: "data/espana.geojson" });
      map.addLayer({
        id: "imprenta-espana-puntos",
        type: "circle",
        source: "imprenta-espana",
        paint: { "circle-radius": 8, "circle-color": "#8b5a2b" }
      });

      map.addSource("imprenta-europa", { type: "geojson", data: "data/europa.geojson" });
      map.addLayer({
        id: "imprenta-europa-puntos",
        type: "circle",
        source: "imprenta-europa",
        paint: { "circle-radius": 8, "circle-color": "#5a3a1a" }
      });

      /* POPUPS */
      const popup = new maplibregl.Popup({ closeButton: false, closeOnClick: false });

      function generarHTML(props) {
        let impresores = props.impresores_relevantes;
        if (typeof impresores === "string") {
          try { impresores = JSON.parse(impresores); }
          catch { impresores = [impresores]; }
        }
        if (!Array.isArray(impresores)) impresores = [impresores];

        let html = `
          <div style="max-width:220px">
            <h3>${props.nombre}</h3>
            <p><strong>País:</strong> ${props.pais}</p>
            <p><strong>Año:</strong> ${props.ano_llegada_imprenta}</p>
            <p><strong>Impresores:</strong> ${impresores.join(", ")}</p>
            <p>${props.nota}</p>
        `;
        if (props.imagen) html += `<img src="${props.imagen}" style="width:100%; border-radius:4px;">`;
        html += `</div>`;
        return html;
      }

      function cerrarPanelSiMovil() {
        if (window.innerWidth <= 768) cerrarPanel();
      }

      /* EVENTOS ESPAÑA */
      map.on("mouseenter", "imprenta-espana-puntos", (e) => {
        map.getCanvas().style.cursor = "pointer";
        popup.setLngLat(e.features[0].geometry.coordinates)
             .setHTML(generarHTML(e.features[0].properties))
             .addTo(map);
      });
      map.on("mouseleave", "imprenta-espana-puntos", () => {
        map.getCanvas().style.cursor = "";
        popup.remove();
      });
      map.on("click", "imprenta-espana-puntos", cerrarPanelSiMovil);

      /* EVENTOS EUROPA */
      map.on("mouseenter", "imprenta-europa-puntos", (e) => {
        map.getCanvas().style.cursor = "pointer";
        popup.setLngLat(e.features[0].geometry.coordinates)
             .setHTML(generarHTML(e.features[0].properties))
             .addTo(map);
      });
      map.on("mouseleave", "imprenta-europa-puntos", () => {
        map.getCanvas().style.cursor = "";
        popup.remove();
      });
      map.on("click", "imprenta-europa-puntos", cerrarPanelSiMovil);

      /* TIMELINE */
      fetch("data/timeline.json")
        .then(r => r.json())
        .then(datos => {
          const cont = document.getElementById("timeline");

          datos.timeline.forEach(item => {
            const div = document.createElement("div");
            div.className = "paso";
            div.innerHTML = `<strong>${item.city}</strong> (${item.year})<br>${item.note}`;

            div.addEventListener("click", () => {
              map.flyTo({
                center: item.map_action.flyTo.center,
                zoom: item.map_action.flyTo.zoom,
                speed: 0.6
              });
              cerrarPanelSiMovil();
            });

            cont.appendChild(div);
          });
        });
    });
  </script>
</body>
</html>
