<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Llegada de la Imprenta</title>

  <!-- MapLibre -->
  <link
    href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />
  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>

  <!-- Estilos -->
  <link rel="stylesheet" href="css/estilos.css" />
</head>

<body>
  <div id="contenedor">
    <div id="panel">
      <h2>Llegada de la Imprenta</h2>
      <div id="timeline"></div>
    </div>

    <div id="map"></div>
  </div>

  <script>
    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {},
        layers: []
      },
      center: [-3.7, 40.4],
      zoom: 4
    });

    map.on("load", function () {

      /* ---------------------------------------------------------
         1) FONDO OSM (FUNCIONA SIEMPRE)
      --------------------------------------------------------- */
      map.addSource("osm", {
        type: "raster",
        tiles: [
          "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
        ],
        tileSize: 256,
        attribution: "© OpenStreetMap contributors"
      });

      map.addLayer({
        id: "osm-layer",
        type: "raster",
        source: "osm",
        paint: {}
      });

      /* ---------------------------------------------------------
         2) CAPA ESPAÑA
      --------------------------------------------------------- */
      map.addSource("imprenta-espana", {
        type: "geojson",
        data: "data/espana.geojson"
      });

      map.addLayer({
        id: "imprenta-espana-puntos",
        type: "circle",
        source: "imprenta-espana",
        paint: {
          "circle-radius": 8,
          "circle-color": "#dc2626"
        }
      });

      /* ---------------------------------------------------------
         3) CAPA EUROPA
      --------------------------------------------------------- */
      map.addSource("imprenta-europa", {
        type: "geojson",
        data: "data/europa.geojson"
      });

      map.addLayer({
        id: "imprenta-europa-puntos",
        type: "circle",
        source: "imprenta-europa",
        paint: {
          "circle-radius": 8,
          "circle-color": "#1d4ed8"
        }
      });

      /* ---------------------------------------------------------
         4) POPUPS
      --------------------------------------------------------- */
      function crearPopup(e) {
        const props = e.features[0].properties;
        let impresores = props.impresores_relevantes;

        try {
          impresores = JSON.parse(impresores);
        } catch (e) {}

        new maplibregl.Popup()
          .setLngLat(e.lngLat)
          .setHTML(`
            <strong>${props.nombre}</strong><br>
            País: ${props.pais}<br>
            Año: ${props.ano_llegada_imprenta}<br>
            Impresores: ${Array.isArray(impresores) ? impresores.join(", ") : impresores}<br>
            <em>${props.nota}</em>
          `)
          .addTo(map);
      }

      map.on("click", "imprenta-espana-puntos", crearPopup);
      map.on("click", "imprenta-europa-puntos", crearPopup);

      /* ---------------------------------------------------------
         5) TIMELINE (CORREGIDO)
      --------------------------------------------------------- */
      fetch("data/timeline.json")
        .then((r) => r.json())
        .then((datos) => {
          const cont = document.getElementById("timeline");

          // 🔥 CAMBIO IMPORTANTE: datos.timeline.forEach
          datos.timeline.forEach((item) => {
            const div = document.createElement("div");
            div.className = "paso";
            div.innerHTML = `<strong>${item.city}</strong> (${item.year})<br>${item.note}`;

            div.addEventListener("click", () => {
              map.flyTo({
                center: item.map_action.flyTo.center,
                zoom: item.map_action.flyTo.zoom,
                speed: 0.6
              });
            });

            cont.appendChild(div);
          });
        });
    });
  </script>
</body>
</html>
