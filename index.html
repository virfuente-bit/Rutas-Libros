<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Llegada de la Imprenta</title>

  <!-- MapLibre -->
  <link
    href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />
  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>

  <!-- Estilos -->
  <link rel="stylesheet" href="css/estilos.css" />
</head>

<body>

  <!-- BOTÓN HAMBURGUESA -->
  <button id="toggle-panel" class="toggle-btn">☰</button>

  <!-- OVERLAY SEMITRANSPARENTE -->
  <div id="overlay"></div>

  <div id="contenedor">
    <div id="panel">

      <!-- BOTÓN DE CERRAR DENTRO DEL PANEL -->
      <button id="close-panel" class="close-btn">✕</button>

      <h2>Llegada de la Imprenta</h2>
      <div id="timeline"></div>
    </div>

    <div id="map"></div>
  </div>

  <script>
    /* ---------------------------------------------------------
       PANEL + OVERLAY
    --------------------------------------------------------- */
    const panel = document.getElementById("panel");
    const overlay = document.getElementById("overlay");
    const toggleBtn = document.getElementById("toggle-panel");
    const closeBtn = document.getElementById("close-panel");

    function abrirPanel() {
      panel.classList.add("open");
      overlay.style.display = "block";
    }

    function cerrarPanel() {
      panel.classList.remove("open");
      overlay.style.display = "none";
    }

    toggleBtn.addEventListener("click", abrirPanel);
    overlay.addEventListener("click", cerrarPanel);
    closeBtn.addEventListener("click", cerrarPanel);

    /* ---------------------------------------------------------
       MAPA
    --------------------------------------------------------- */
    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {},
        layers: []
      },
      center: [-3.7, 40.4],
      zoom: 4
    });

    map.on("load", function () {

      /* ---------------------------------------------------------
         1) FONDO OSM
      --------------------------------------------------------- */
      map.addSource("osm", {
        type: "raster",
        tiles: [
          "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
        ],
        tileSize: 256,
        attribution: "© OpenStreetMap contributors"
      });

      map.addLayer({
        id: "osm-layer",
        type: "raster",
        source: "osm",
        paint: {}
      });

      /* ---------------------------------------------------------
         2) CAPA ESPAÑA
      --------------------------------------------------------- */
      map.addSource("imprenta-espana", {
        type: "geojson",
        data: "data/espana.geojson"
      });

      map.addLayer({
        id: "imprenta-espana-puntos",
        type: "circle",
        source: "imprenta-espana",
        paint: {
          "circle-radius": 8,
          "circle-color": "#dc2626"
        }
      });

      /* ---------------------------------------------------------
         3) CAPA EUROPA
      --------------------------------------------------------- */
      map.addSource("imprenta-europa", {
        type: "geojson",
        data: "data/europa.geojson"
      });

      map.addLayer({
        id: "imprenta-europa-puntos",
        type: "circle",
        source: "imprenta-europa",
        paint: {
          "circle-radius": 8,
          "circle-color": "#1d4ed8"
        }
      });

      /* ---------------------------------------------------------
         4) POPUPS — HOVER + FOTO
      --------------------------------------------------------- */

      const popup = new maplibregl.Popup({
        closeButton: false,
        closeOnClick: false
      });

      function generarHTML(props) {
        let impresores = props.impresores_relevantes;

        if (typeof impresores === "string") {
          try {
            impresores = JSON.parse(impresores);
          } catch {
            impresores = [impresores];
          }
        }

        if (!Array.isArray(impresores)) {
          impresores = [impresores];
        }

        let html = `
          <div style="max-width:220px">
            <h3 style="margin:0; font-size:16px;">${props.nombre}</h3>
            <p style="margin:4px 0;"><strong>País:</strong> ${props.pais}</p>
            <p style="margin:4px 0;"><strong>Año llegada imprenta:</strong> ${props.ano_llegada_imprenta}</p>
            <p style="margin:4px 0;"><strong>Impresores:</strong> ${impresores.join(", ")}</p>
            <p style="margin:4px 0;">${props.nota}</p>
        `;

        if (props.imagen) {
          html += `<img src="${props.imagen}" style="width:100%; border-radius:4px; margin-top:6px;">`;
        }

        html += `</div>`;
        return html;
      }

      /* ---------------------------------------------------------
         CIERRE AUTOMÁTICO DEL PANEL AL TOCAR UN PUNTO
      --------------------------------------------------------- */

      function cerrarPanelSiMovil() {
        if (window.innerWidth <= 768) {
          cerrarPanel();
        }
      }

      /* ESPAÑA */
      map.on("mouseenter", "imprenta-espana-puntos", (e) => {
        map.getCanvas().style.cursor = "pointer";
        const feature = e.features[0];
        popup
          .setLngLat(feature.geometry.coordinates)
          .setHTML(generarHTML(feature.properties))
          .addTo(map);
      });

      map.on("mouseleave", "imprenta-espana-puntos", () => {
        map.getCanvas().style.cursor = "";
        popup.remove();
      });

      map.on("click", "imprenta-espana-puntos", cerrarPanelSiMovil);

      /* EUROPA */
      map.on("mouseenter", "imprenta-europa-puntos", (e) => {
        map.getCanvas().style.cursor = "pointer";
        const feature = e.features[0];
        popup
          .setLngLat(feature.geometry.coordinates)
          .setHTML(generarHTML(feature.properties))
          .addTo(map);
      });

      map.on("mouseleave", "imprenta-europa-puntos", () => {
        map.getCanvas().style.cursor = "";
        popup.remove();
      });

      map.on("click", "imprenta-europa-puntos", cerrarPanelSiMovil);

      /* ---------------------------------------------------------
         5) TIMELINE
      --------------------------------------------------------- */
      fetch("data/timeline.json")
        .then((r) => r.json())
        .then((datos) => {
          const cont = document.getElementById("timeline");

          datos.timeline.forEach((item) => {
            const div = document.createElement("div");
            div.className = "paso";
            div.innerHTML = `<strong>${item.city}</strong> (${item.year})<br>${item.note}`;

            div.addEventListener("click", () => {
              map.flyTo({
                center: item.map_action.flyTo.center,
                zoom: item.map_action.flyTo.zoom,
                speed: 0.6
              });

              cerrarPanelSiMovil();
            });

            cont.appendChild(div);
          });
        });
    });
  </script>
</body>
</html>
